  <!-- Tailwind CSS CDN -->

  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            surface: {
              0: '#0a0a0f',
              1: '#12121a',
              2: '#1a1a26',
              3: '#22222f',
            },

              DEFAULT: '#34d399',
              dim: '#10b981',

            },

          },
          fontFamily: {
            mono: ['"JetBrains Mono"', 'ui-monospace', 'SFMono-Regular', 'monospace'],
            sans: ['"DM Sans"', 'system-ui', 'sans-serif'],
          },
        },
      },
    };

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
    }

    body {
      background-color: #0a0a0f;
      color: #e5e7eb;
      font-family: 'DM Sans', system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* Scan-line texture overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      z-index: 9999;
      pointer-events: none;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(255, 255, 255, 0.008) 2px,
        rgba(255, 255, 255, 0.008) 4px
      );
    }

    /* Skeleton shimmer */
    @keyframes shimmer {
      0% { background-position: -400px 0; }
      100% { background-position: 400px 0; }
    }

    .skeleton {
      background: linear-gradient(90deg, #1a1a26 25%, #22222f 37%, #1a1a26 63%);
      background-size: 800px 100%;
      animation: shimmer 1.8s ease-in-out infinite;
      border-radius: 6px;
    }

    /* Fade-in on load */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .animate-fade-up { opacity: 0; animation: fadeUp 0.6s ease-out forwards; }
    .delay-100 { animation-delay: 0.1s; }
    .delay-200 { animation-delay: 0.2s; }
    .delay-300 { animation-delay: 0.3s; }
    .delay-400 { animation-delay: 0.4s; }
    .delay-500 { animation-delay: 0.5s; }
    .delay-600 { animation-delay: 0.6s; }

    /* Card glow on hover */
    .project-card {
      position: relative;
      transition: transform 0.25s ease, box-shadow 0.25s ease;
    }

    .project-card::before {
      content: '';
      position: absolute;
      inset: -1px;
      border-radius: 14px;
      background: linear-gradient(135deg, transparent 40%, rgba(52, 211, 153, 0.25));
      opacity: 0;
      transition: opacity 0.3s ease;
      z-index: -1;
    }

    .project-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 8px 30px rgba(52, 211, 153, 0.08);
    }

    .project-card:hover::before { opacity: 1; }

    /* Tech badge hover */
    .tech-badge {
      transition: background-color 0.2s ease, color 0.2s ease, transform 0.15s ease;
    }

    .tech-badge:hover {
      background-color: rgba(52, 211, 153, 0.15);
      color: #34d399;
      transform: translateY(-1px);
    }

    /* Cursor blink */
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }

    .cursor-blink::after {
      content: '\2588';
      animation: blink 1s step-end infinite;
      color: #34d399;
      margin-left: 2px;
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #0a0a0f; }
    ::-webkit-scrollbar-thumb { background: #22222f; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #2a2a3a; }

    /* Star pulse */
    @keyframes starPulse {
      0%, 100% { opacity: 0.7; }
      50% { opacity: 1; }
    }

    .star-icon { animation: starPulse 2s ease-in-out infinite; }

    /* Line-clamp fallback */
    .line-clamp-3 {
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
  </style>
</head>

  <!-- ===== JavaScript ===== -->
  <script>
    (function () {
      'use strict';

      /* ── Configuration ─────────────────────────────────── */
      var GITHUB_USER = 'y-maeda1116';
      var REPO_NAMES = [
        'Weekly-Task-Board',
        'sumida-stream-coffee',
        'apple-refurb-discord-notify',
      ];
      var API_BASE = 'https://api.github.com/repos/' + GITHUB_USER + '/';

      var TECH_STACK = [
        { name: 'Go',            color: '#00ADD8' },
        { name: 'Python',        color: '#3776AB' },
        { name: 'Linux',         color: '#FCC624' },
        { name: 'AWS',           color: '#FF9900' },
        { name: 'GitHub Actions', color: '#2088FF' },
        { name: 'Docker',        color: '#2496ED' },
        { name: 'Terraform',     color: '#7B42BC' },
        { name: 'CI/CD',         color: '#34d399' },
        { name: 'TypeScript',    color: '#3178C6' },
        { name: 'SRE',           color: '#f472b6' },
      ];

      /* ── Language color map ────────────────────────────── */
      var LANG_COLORS = {
        'Go': '#00ADD8', 'Python': '#3776AB', 'TypeScript': '#3178C6',
        'JavaScript': '#F7DF1E', 'HTML': '#E34F26', 'CSS': '#1572B6',
        'Shell': '#89E051', 'HCL': '#844FBA', 'Dart': '#00B4AB',
        'Ruby': '#CC342D', 'Rust': '#DEA584', 'Java': '#B07219',
      };

      /* ── DOM references ────────────────────────────────── */
      var techContainer = document.getElementById('tech-stack');
      var grid = document.getElementById('projects-grid');

      /* ── HTML escape (prevents XSS) ────────────────────── */
      function escapeHtml(str) {
        var div = document.createElement('div');
        div.appendChild(document.createTextNode(String(str)));
        return div.innerHTML;
      }

      /* ── DOM helper: build element safely ──────────────── */
      function el(tag, attrs, children) {
        var node = document.createElement(tag);
        if (attrs) {
          Object.keys(attrs).forEach(function (key) {
            if (key === 'className') {
              node.className = attrs[key];
            } else if (key === 'textContent') {
              node.textContent = attrs[key];
            } else if (key.indexOf('on') === 0) {
              node.addEventListener(key.slice(2).toLowerCase(), attrs[key]);
            } else {
              node.setAttribute(key, attrs[key]);
            }
          });
        }
        if (children) {
          (Array.isArray(children) ? children : [children]).forEach(function (child) {
            if (typeof child === 'string') {
              node.appendChild(document.createTextNode(child));
            } else if (child) {
              node.appendChild(child);
            }
          });
        }
        return node;
      }

      /* ── Render tech stack badges ──────────────────────── */
      function renderTechStack() {
        TECH_STACK.forEach(function (tech) {
          var badge = el('span', {
            className: 'tech-badge inline-flex items-center gap-2 px-4 py-2 rounded-lg border border-surface-3 bg-surface-2 text-sm font-mono text-gray-300 select-none',
          }, [
            el('span', {
              className: 'w-2 h-2 rounded-full',
              'style': 'background-color:' + tech.color,
            }),
            tech.name,
          ]);
          techContainer.appendChild(badge);
        });
      }

      /* ── Create skeleton card ──────────────────────────── */
      function createSkeletonCard() {
        var card = el('div', {
          className: 'project-card rounded-xl border border-surface-3 bg-surface-1 p-6 flex flex-col gap-4',
        });
        card.appendChild(el('div', { className: 'skeleton h-6 w-3/4' }));
        card.appendChild(el('div', { className: 'skeleton h-4 w-full' }));
        card.appendChild(el('div', { className: 'skeleton h-4 w-2/3' }));
        var footer = el('div', { className: 'mt-auto flex items-center gap-4' });
        footer.appendChild(el('div', { className: 'skeleton h-4 w-16' }));
        footer.appendChild(el('div', { className: 'skeleton h-4 w-20' }));
        card.appendChild(footer);
        return card;
      }

      /* ── Create error card ─────────────────────────────── */
      function createErrorCard(repoName, message) {
        var iconSvg = '<svg class="w-4 h-4 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>';
        var card = el('div', {
          className: 'project-card rounded-xl border border-red-900/40 bg-surface-1 p-6 flex flex-col gap-3',
        });
        var header = el('div', { className: 'flex items-center gap-2 text-red-400 font-mono text-sm' });
        header.insertAdjacentHTML('afterbegin', iconSvg);
        header.appendChild(document.createTextNode(repoName));
        card.appendChild(header);
        card.appendChild(el('p', { className: 'text-sm text-red-300/70', textContent: message }));
        return card;
      }

      /* ── Create project card ───────────────────────────── */
      function createProjectCard(repo) {
        var langColor = LANG_COLORS[repo.language] || '#6b7280';
        var lang = repo.language || '—';
        var desc = repo.description || 'No description provided';
        var stars = String(repo.stargazers_count);

        var starSvg = '<svg class="w-3.5 h-3.5" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87L18.18 22 12 18.56 5.82 22 7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>';

        var card = el('a', {
          className: 'project-card rounded-xl border border-surface-3 bg-surface-1 p-6 flex flex-col gap-4 group no-underline focus:outline-none focus:ring-2 focus:ring-accent/50 focus:ring-offset-2 focus:ring-offset-surface-0',
          'href': repo.html_url,
          'target': '_blank',
          'rel': 'noopener noreferrer',
        });

        var title = el('h3', {
          className: 'font-mono text-base font-semibold text-white group-hover:text-accent transition-colors truncate',
          textContent: repo.name,
        });
        card.appendChild(title);

        var description = el('p', {
          className: 'text-sm text-gray-400 leading-relaxed flex-1 line-clamp-3',
          textContent: desc,
        });
        card.appendChild(description);

        var metaRow = el('div', {
          className: 'flex items-center gap-4 mt-auto pt-2 border-t border-surface-3',
        });

        var langBadge = el('span', {
          className: 'inline-flex items-center gap-1.5 text-xs text-gray-500 font-mono',
        }, [
          el('span', {
            className: 'w-2.5 h-2.5 rounded-full',
            'style': 'background-color:' + langColor,
          }),
          lang,
        ]);
        metaRow.appendChild(langBadge);

        var starBadge = el('span', {
          className: 'inline-flex items-center gap-1 text-xs text-gray-500 font-mono star-icon',
        });
        starBadge.insertAdjacentHTML('afterbegin', starSvg);
        starBadge.appendChild(document.createTextNode(stars));
        metaRow.appendChild(starBadge);

        card.appendChild(metaRow);
        return card;
      }

      /* ── Fetch single repo ─────────────────────────────── */
      function fetchRepo(name) {
        return fetch(API_BASE + name, {
          headers: { 'Accept': 'application/vnd.github.v3+json' },
        }).then(function (res) {
          if (!res.ok) {
            throw new Error('HTTP ' + res.status + ': ' + res.statusText);
          }
          return res.json();
        });
      }

      /* ── Load and render projects ──────────────────────── */
      function loadProjects() {
        // Show skeleton placeholders
        REPO_NAMES.forEach(function () {
          grid.appendChild(createSkeletonCard());
        });

        // Fetch all repos
        var promises = REPO_NAMES.map(function (name) {
          return fetchRepo(name)
            .then(function (data) { return { ok: true, data: data }; })
            .catch(function (err) { return { ok: false, name: name, error: err.message }; });
        });

        Promise.all(promises).then(function (results) {
          // Clear skeletons
          grid.textContent = '';

          // Render each result
          results.forEach(function (result) {
            if (result.ok) {
              grid.appendChild(createProjectCard(result.data));
            } else {
              grid.appendChild(createErrorCard(result.name, result.error));
            }
          });
        });
      }

      /* ── Initialize ────────────────────────────────────── */
      renderTechStack();
      loadProjects();
    })();
  </script>

</body>
